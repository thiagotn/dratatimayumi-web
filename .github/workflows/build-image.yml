name: Build and push container image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dratatimayumi-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # GitOps: após publicar a imagem, atualiza a tag no repo homelab (privado) e dá push.
  # O Argo CD detecta o commit e faz o rollout — o cluster NÃO recebe nada deste CI (read-only).
  # Credencial: deploy key de ESCRITA do homelab, em secrets.HOMELAB_DEPLOY_KEY (escopada ao repo).
  bump-homelab-tag:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homelab (deploy key SSH)
        uses: actions/checkout@v4
        with:
          repository: thiagotn/homelab
          ssh-key: ${{ secrets.HOMELAB_DEPLOY_KEY }}
          path: homelab

      - name: Atualizar newTag no kustomization e dar push
        working-directory: homelab
        run: |
          set -euo pipefail
          TAG="sha-${GITHUB_SHA}"
          yq -i ".images[0].newTag = \"${TAG}\"" helm/apps/dratatimayumi/kustomization.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/apps/dratatimayumi/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Tag já é ${TAG}; nada a commitar."
          else
            git commit -m "deploy(dratatimayumi): ${TAG} [skip ci]"
            git push
          fi
