worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on; tcp_nopush on; server_tokens off;

    gzip on; gzip_vary on; gzip_min_length 1024; gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    log_format main '$remote_addr - $status "$request" "$http_user_agent"';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Redirect do domínio .com (e www) para o canônico .com.br
    server {
        listen 8080;
        server_name dratatimayumi.com www.dratatimayumi.com;
        location = /healthz { access_log off; return 200 "ok\n"; }
        return 301 https://dratatimayumi.com.br$request_uri;
    }

    # Conteúdo (canônico .com.br, www, e default)
    server {
        listen 8080 default_server;
        server_name dratatimayumi.com.br www.dratatimayumi.com.br _;
        root /usr/share/nginx/html;
        index index.html;

        # Headers de segurança definidos no nível do server. ATENÇÃO: nginx só herda
        # estes add_header em locations que NÃO tenham seu próprio add_header. Por isso
        # o cache abaixo usa a diretiva `expires` (não cancela a herança), e não add_header.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # CSP omitido de propósito: site usa Tailwind/Google Fonts/Analytics via CDN.

        location = /healthz { access_log off; default_type text/plain; return 200 "ok\n"; }

        location /assets/ { expires 30d; try_files $uri =404; }
        location /js/     { expires 7d;  try_files $uri =404; }
        location = /favicon.ico { expires 30d; access_log off; log_not_found off; }

        location = / { expires -1; try_files /index.html =404; }
        location ~* \.html$ { expires -1; }

        location = /robots.txt  { access_log off; }
        location = /sitemap.xml { }

        location / { try_files $uri $uri/ /index.html; }
    }
}
